# VATSIM Activity Bot Worker (main audit worker)
# Runs daily audit checks against VATSIM data
# Deploy: npx wrangler deploy -c workers/vatsimactivitybot.toml

name = "vatsimactivitybot"
main = "../worker-complete.js"
compatibility_date = "2024-01-01"
account_id = "baf002432f05611f72b33b7b2e5028f1"

# Cron triggers:
#   - Every 5 minutes: live rating/ATIS violation check
#   - Daily at 06:00 UTC: full audit (handled by worker logic)
[triggers]
crons = ["*/5 * * * *"]

# KV Namespace bindings
# Replace <KV_NAMESPACE_ID> with your actual vatpac-audits namespace ID
# Find it: npx wrangler kv namespace list
[[kv_namespaces]]
binding = "hours"
id = "eed282e8c3c54680981aa1e60520eaf6"

[[kv_namespaces]]
binding = "sessions"
id = "eed282e8c3c54680981aa1e60520eaf6"

[vars]
# DISCORD_WEBHOOK_URL set via: wrangler secret put DISCORD_WEBHOOK_URL -c workers/vatsimactivitybot.toml
