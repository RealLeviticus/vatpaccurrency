name: Sync VATPAC Positions

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync positions from vatSys datasets
        run: node scripts/sync-positions.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet positions.js && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated positions
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add positions.js
          git commit -m "chore: sync VATPAC positions from vatSys datasets"
          git push

      - name: Deploy workers
        if: steps.diff.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler deploy -c workers/kv-reader.toml
          npx wrangler deploy -c workers/vatsimactivitybot.toml
          npx wrangler deploy -c workers/statsimscrape.toml
